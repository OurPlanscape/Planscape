<div id="{{ id }}_div_map" class="dj_map_wrapper">
  <div id="{{ id }}_map" class="dj_map"></div>
  <textarea id="{{ id }}" class="vSerializedField required" cols="150" rows="10" name="{{ name }}"{% if widget.attrs.disabled %} disabled{% endif %} hidden></textarea>
  <script>
    (function () {
      "use strict";

      function lockMap(widget) {
        widget.disableDrawing();

        if (widget.interactions.draw) {
          widget.map.removeInteraction(widget.interactions.draw);
        }
        if (widget.interactions.modify) {
          widget.interactions.modify.setActive(false);
          widget.map.removeInteraction(widget.interactions.modify);
        }
      }

      const options = JSON.parse("{{ widget.map_options_json|escapejs }}");
      options.base_layer = new ol.layer.Tile({ source: new ol.source.OSM() });

      const mapWidget = new MapWidget(options);
      lockMap(mapWidget);

      const geometryUrl = "{{ widget.geometry_url|escapejs }}";
      if (!geometryUrl) {
        return;
      }

      fetch(geometryUrl, {
        credentials: "same-origin",
        headers: { "X-Requested-With": "XMLHttpRequest" }
      })
        .then(function (response) {
          if (!response.ok) {
            return null;
          }
          return response.json();
        })
        .then(function (payload) {
          if (!payload || !payload.geometry) {
            return;
          }

          const features = new ol.format.GeoJSON().readFeatures(
            {
              type: "Feature",
              geometry: payload.geometry,
              properties: {}
            },
            {
              featureProjection: mapWidget.map.getView().getProjection()
            }
          );

          const extent = ol.extent.createEmpty();
          features.forEach(function (feature) {
            mapWidget.featureOverlay.getSource().addFeature(feature);
            ol.extent.extend(extent, feature.getGeometry().getExtent());
          });

          if (!ol.extent.isEmpty(extent)) {
            mapWidget.map.getView().fit(extent, { minResolution: 1 });
          }
        });
    })();
  </script>
</div>
