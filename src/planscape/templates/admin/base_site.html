{% extends "admin/base_site.html" %}

{% block extrastyle %}
  {{ block.super }}
  <style>
    .catalog-environment-banner-wrap {
      padding: 12px 24px 8px;
      box-sizing: border-box;
      width: 100%;
    }

    .catalog-environment-banner {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 16px;
      background: #161a20;
      border: 1px solid #2b3138;
      border-radius: 4px;
      color: #e8edf2;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }

    .catalog-environment-banner__title {
      margin: 0 0 4px;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
      color: #f5f7fa;
    }

    .catalog-environment-banner__text {
      margin: 0;
      font-size: 0.92rem;
      line-height: 1.4;
      color: #c9d1d9;
    }

    @media (max-width: 767px) {
      .catalog-environment-banner-wrap {
        padding: 10px 12px 6px;
      }

      .catalog-environment-banner {
        padding: 10px 12px;
      }

      .catalog-environment-banner__title {
        font-size: 0.95rem;
      }

      .catalog-environment-banner__text {
        font-size: 0.88rem;
      }
    }
  </style>
{% endblock %}

{% block messages %}
  {% if ENV == "catalog" %}
    <div class="catalog-environment-banner-wrap">
      <div class="catalog-environment-banner">
        <div class="catalog-environment-banner__title">Catalog Environment</div>
        <p class="catalog-environment-banner__text">
          Source of truth for datasets and data layers.
        </p>
      </div>
    </div>
  {% endif %}
  {{ block.super }}
{% endblock %}
