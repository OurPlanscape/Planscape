      type: object
      description: One color stop in a raster style (`RasterStyleData.entries[]`).
      properties:
        value:
          type: number
          format: double
        color:
          type: string
        opacity:
          type: number
          format: double
        label:
          type: string
          nullable: true
      required:
      - color
      - value
    RasterStyleNoDataOutput:
      type: object
      description: No-data sentinel block for a raster style (`RasterStyleData.no_data`).
