  /planscape-backend/dj-rest-auth/token/refresh/:
    post:
      operationId: dj_rest_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - dj-rest-auth
      requestBody:
        content:
          application/json:
