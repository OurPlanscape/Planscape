      - id
      - inviter
      - object_pk
      - permissions
      - role
      - updated_at
    VariablesEnum:
      enum:
      - CBD
      - CBH
      - CC
      - FBFM
      - FL
      - LARGE_TREE_BIOMASS
      - MERCH_BIOMASS
      - MORTALITY
      - NON_MERCH_BIOMASS
      - POTENTIAL_SMOKE
      - PTORCH
      - QMD
      - ROS
      - SDI
      - TH
      - TOT_FLAME_SEV
      - TOTAL_CARBON
