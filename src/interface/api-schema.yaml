        * `SECONDARY_METRIC` - Secondary Metric
        * `THRESHOLD` - Threshold
        * `EXCLUSION_ZONE` - Exclusion Zone
        * `INCLUSION_ZONE` - Inclusion Zone
    UserDetails:
      type: object
