      type: object
      description: |-
        Output schema for `DataLayer.info` for raster layers — the JSONified
        output of gdalinfo. Vector layers store ogrinfo here instead, with a
        completely different shape; consumers that need vector info should treat
        `info` as opaque JSON. The schema declared here lets the generated TS
        client carry typed access for the (overwhelmingly common) raster case.
      properties:
        crs:
          type: string
        res:
          type: array
          items:
            type: number
            format: double
        count:
          type: integer
        dtype:
          type: string
        shape:
          type: array
          items:
            type: integer
        stats:
          type: array
          items:
            $ref: '#/components/schemas/RasterInfoStats'
        tiled:
          type: boolean
        units:
          type: array
          items:
            type: string
            nullable: true
        width:
          type: integer
        bounds:
          type: array
          items:
            type: number
            format: double
        driver:
          type: string
        height:
          type: integer
        lnglat:
          type: array
          items:
            type: number
            format: double
        nodata:
          type: number
          format: double
        indexes:
          type: array
          items:
            type: integer
        checksum:
          type: array
          items:
            type: integer
        compress:
          type: string
        transform:
          type: array
          items:
            type: number
            format: double
        blockxsize:
          type: integer
        blockysize:
          type: integer
        interleave:
          type: string
        mask_flags:
          type: array
          items:
            type: array
            items:
              type: string
        colorinterp:
          type: array
          items:
            type: string
        descriptions:
          type: array
          items:
            type: string
            nullable: true
      required:
      - blockxsize
      - blockysize
      - bounds
      - checksum
      - colorinterp
      - compress
      - count
      - crs
      - descriptions
      - driver
      - dtype
      - height
      - indexes
      - interleave
      - lnglat
      - mask_flags
      - nodata
      - res
      - shape
      - stats
      - tiled
      - transform
      - units
      - width
    RasterInfoStats:
      type: object
      description: gdalinfo per-band stats. Embedded inside `RasterInfo.stats[]`.
      properties:
        min:
          type: number
          format: double
        max:
