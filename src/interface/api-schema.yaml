  /planscape-backend/v2/climate-foresight-runs/{id}/run_analysis/:
    post:
      operationId: v2_climate_foresight_runs_run_analysis_create
      description: |-
        Start the full Climate Foresight analysis pipeline.

        This endpoint kicks off the entire workflow:
        1. Normalize all input layers
        2. Rollup pillars
        3. Rollup landscape (current + future)
        4. Run PROMOTe analysis (MPAT outputs)

        The run must be in DRAFT status and have:
        - All input layers with favor_high set
        - All input layers assigned to pillars

        Returns a summary of what was started.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClimateForesightRun'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClimateForesightRun'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClimateForesightRun'
        required: true
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClimateForesightRun'
          description: ''
  /planscape-backend/v2/climate-foresight-runs/{id}/trigger_next_steps/:
    post:
      operationId: v2_climate_foresight_runs_trigger_next_steps_create
      description: |-
        Check run completion status.

        With the new workflow model, the entire pipeline runs as a single
        Celery chain. This endpoint now just checks completion status.

        Returns a summary of the run status.
