<mat-expansion-panel
  togglePosition="before"
  [ngClass]="{ 'no-header': !headline }"
  [expanded]="!isCollapsible || defaultExpanded"
  [disabled]="!isCollapsible">
  <mat-expansion-panel-header class="panel-header" *ngIf="headline">
    <div class="title-txt">
      {{ headline }}<span class="required" *ngIf="required"> *</span>
    </div>
    <sg-popover
      *ngIf="tooltipContent"
      class="popover-right"
      [content]="tooltipContent"
      [icon]="tooltipIcon"
      size="lg"></sg-popover>
    <button
      *ngIf="tooltipLink"
      sg-button
      variant="icon-only"
      [icon]="tooltipIcon"
      [outlined]="true"
      class="popover-right"
      (click)="navigateToLink()"></button>
  </mat-expansion-panel-header>
  <ng-content></ng-content>
</mat-expansion-panel>
