<div class="title-row">
  <div class="scenario-name">{{ name }}</div>

  <div class="controls-section">
    <div
      class="scenario-type-chip scenario"
      [class.project-area]="isProjectArea">
      {{ isProjectArea ? 'Project areas' : 'Scenario' }}
    </div>
    <button
      [hidden]="!userCanDeleteScenario && hasFailed"
      [disabled]="isRunning() || !contextualMenuEnabled"
      [matMenuTriggerFor]="menu"
      aria-label="More scenario options"
      class="more-menu-button"
      (click)="handleMoreMenuClick($event)"
      mat-icon-button
      matTooltip="More actions">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu class="scenario-more-menu" #menu="matMenu">
      <button
        class="action-button"
        mat-menu-item
        *ngIf="userCanEditScenario && !isProjectArea"
        (click)="copyScenario.emit()">
        <mat-icon class="material-symbols-outlined">file_copy</mat-icon>
        <span>Copy & Edit</span>
      </button>
      <button
        mat-menu-item
        class="action-button"
        *ngIf="userCanEditScenario"
        (click)="editScenario.emit()">
        <mat-icon class="material-symbols-outlined">edit</mat-icon>
        <span>Rename</span>
      </button>
      <button
        class="action-button delete"
        mat-menu-item
        *ngIf="userCanDeleteScenario"
        (click)="deleteScenario.emit()">
        <mat-icon class="material-symbols-outlined">delete</mat-icon>
        <span>Delete</span>
      </button>
    </mat-menu>
  </div>
</div>
<div class="detail-row">
  <div class="detail-column">
    <div class="detail-header">Creator</div>
    <div class="detail-info">
      {{ creator ?? 'N/A' }}
    </div>
  </div>
  <div class="detail-column">
    <div class="detail-header">Date Created</div>
    <div class="detail-info">
      {{ created_at ? (created_at | date: 'MMM d, y') : '-' }}
    </div>
  </div>
  <div class="detail-column" [hidden]="isProjectArea">
    <div class="detail-header" [hidden]="isProjectArea">Status</div>
    <div class="detail-info">
      <sg-status-chip
        *ngIf="resultStatus && origin === 'SYSTEM'"
        [status]="getChipStatus()"
        [label]="getChipLabel()"></sg-status-chip>
    </div>
  </div>
</div>
