<div class="label" *ngIf="hasLabel">
  {{ label }} <span class="required" *ngIf="isRequired">*</span>
</div>
<div class="flex-wrapper">
  <div class="input-wrapper" (click)="focusInput()">
    <mat-icon *ngIf="leadingIcon">{{ leadingIcon }}</mat-icon>
    <ng-content></ng-content>
    <span *ngIf="suffix && !trailingIcon" class="suffix">{{ suffix }}</span>
    <mat-icon *ngIf="trailingIcon">{{ trailingIcon }}</mat-icon>
  </div>
  <div class="content-right">
    <ng-content select="[contentRight]"></ng-content>
  </div>
</div>

<div class="support-msg" *ngIf="displaysSupportMessage">
  {{ supportMessage }}
</div>
