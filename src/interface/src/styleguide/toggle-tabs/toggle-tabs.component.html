<mat-button-toggle-group
  class="toggle-tabs"
  [value]="defaultSelection"
  (change)="handleSelection($event)">
  <mat-button-toggle *ngFor="let btn of buttons" [value]="btn.value">
    <mat-icon class="material-symbols-outlined">{{ btn.icon }}</mat-icon>
    {{ btn.name }}</mat-button-toggle
  >
</mat-button-toggle-group>
