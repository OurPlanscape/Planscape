<!-- Two columns layout START -->
<ng-container *ngIf="currentPlan$ | async as plan">
  <sg-dashboard-layout
    layoutVariant="disable-right-scroll"
    class="scenario-dashboard-layout">
    <div header>
      <!-- NavBar -->
      <app-nav-bar area="SCENARIO"></app-nav-bar>
    </div>
    <div left-column class="plan-overview-column">
      <sg-details-card
        *ngIf="currentScenario$ | async as scenario"
        title="Scenario Dashboard"
        [subtitle]="scenario.name"
        [creator]="plan.creator"
        [acres]="plan.area_acres"
        [created_at]="plan.created_at"
        [planning_area_name]="plan?.name || ''"></sg-details-card>
      <!-- Dashboard tools -->
      <sg-details-card title="Project Area Tools" class="scenario-tools-card">
        <!--Subtitle-->
        <p class="description">
          Refine your project planning further by using our specialized project
          area tools.
        </p>
        <!--Tools-->
        <div class="tools">
          <sg-tile-button
            *ngFor="let tool of scenarioDashboardTools"
            [backgroundImage]="tool.backgroundImage"
            [backgroundColor]="tool.backgroundColor ?? ''"
            [title]="tool.title"
            size="lg"
            [subtitle]="tool.subtitle"
            [disabled]="!tool.enabled">
          </sg-tile-button>
        </div>
      </sg-details-card>
    </div>
    <div right-column class="plan-scenarios-column">
      <p>Right column placeholder</p>
    </div>
  </sg-dashboard-layout>
</ng-container>
