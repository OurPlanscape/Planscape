<ng-template #tableTooltipContent>
  <dl class="table-tooltip">
    <dt>Acres:</dt>
    <dd>Total number of treated acres based on scenario</dd>

    <dt>% Total:</dt>
    <dd>Treated Acres/Planning Area Acres</dd>

    <dt>Rx Leverage:</dt>
    <dd>The treatment efficiency per 1000 acres treated.</dd>
    <dd>
      (Sum of Treatment Opportunity for Priority Objectives/Treated Acres) *
      1000
    </dd>

    <dt>Estimated Cost:</dt>
    <dd>Treatment Cost Per Acre * Treated Acres</dd>
  </dl>
</ng-template>

<sg-section
  [isCollapsible]="hasAnalytics()"
  [tooltipTemplate]="isPlanningApproachSubUnits ? tableTooltipContent : null"
  [headline]="isPlanningApproachSubUnits ? 'Top 10 Subunits' : 'Project Areas'">
  <app-project-areas
    [areas]="areas"
    [showRxLeverage]="isPlanningApproachSubUnits"></app-project-areas>
</sg-section>

<sg-section
  [isCollapsible]="true"
  headline="Scenario Analytics"
  [tooltipContent]="scenarioAnalyticsTooltip"
  *ngIf="hasAnalytics()">
  <app-scenario-metrics-legend
    *ngIf="results"
    [scenarioResult]="results"
    [scenarioId]="scenarioId"
    [usageTypes]="usageTypes">
  </app-scenario-metrics-legend>

  <app-treatment-opportunity-chart
    class="chart"
    *ngIf="results"
    [usageTypes]="usageTypes"
    [planningApproach]="planningApproach"
    [scenarioResult]="results"></app-treatment-opportunity-chart>

  <app-cumulative-attainment-chart
    class="chart"
    *ngIf="results"
    [scenarioResult]="results"></app-cumulative-attainment-chart>
</sg-section>

<div class="actions" *ngIf="!hasAnalytics()">
  <button sg-button (click)="downloadShapeFiles()" data-id="downloadShapeFiles">
    Download Shape Files
  </button>

  <button sg-button (click)="downloadCsv()" data-id="downloadCsv">
    Download CSV Data
  </button>
</div>
