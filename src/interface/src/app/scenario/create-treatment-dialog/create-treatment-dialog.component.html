<sg-modal
  title="Name Your Treatment Plan"
  primaryButtonText="Save"
  [showClose]="false"
  secondaryButtonText="Cancel"
  [primaryButtonDisabled]="submitting || treatmentForm.invalid"
  [hasPrimarySpinner]="true"
  [isInSpinState]="submitting"
  (clickedSecondary)="cancel()"
  (clickedClose)="cancel()"
  (clickedPrimary)="submit()">
  <div modalBodyContent>
    <form
      [formGroup]="treatmentForm"
      (ngSubmit)="submitIfValid($event)"
      class="modal-form">
      <div class="form-line">
        <label for="treatmentName" class="form-label"
          >Treatment Plan Name <span>*</span></label
        >
        <sg-input-field class="form-field" size="full">
          <input
            id="treatmentName"
            sgInput
            cdkFocusInitial
            formControlName="treatmentName" />
        </sg-input-field>
      </div>
      <div class="form-line" *ngIf="this.data.requestStandSize">
        <label for="standSize" class="form-label"
          >Select a stand size <span>*</span></label
        >
        <mat-form-field
          class="stand-picker-field"
          appearance="outline"
          subscriptSizing="dynamic">
          <mat-select name="standSize" formControlName="standSize">
            <mat-option class="nav-page-item" value="SMALL"
              >Small (10 acres)
            </mat-option>
            <mat-option class="nav-page-item" value="MEDIUM"
              >Medium (100 acres)
            </mat-option>
            <mat-option class="nav-page-item" value="LARGE"
              >Large (500 acres)
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </form>
  </div>
</sg-modal>
