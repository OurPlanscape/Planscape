<sg-overlay-loader *ngIf="loadingPlan"></sg-overlay-loader>
<app-nav-bar area="SCENARIOS"></app-nav-bar>
<div>
  <app-resource-unavailable
    *ngIf="planNotFound"
    resource="plan"></app-resource-unavailable>
  <ng-container *ngIf="currentPlan$ | async as plan">
    <div class="plan-overview-container">
      <div class="plan-overview-panel">
        <app-planning-area-details-card
          [plan]="currentPlan$ | async"></app-planning-area-details-card>
        <app-map-viewer-card></app-map-viewer-card>
        <app-planning-analytics-tools
          [planningAreaCapabilities]="
            plan.capabilities
          "></app-planning-analytics-tools>
        <app-notes-expansion-card></app-notes-expansion-card>
      </div>
      <div class="plan-content plan-overview">
        <div class="placeholder-scenarios">
          <app-plan-scenarios-list></app-plan-scenarios-list>
        </div>
      </div>
    </div>
  </ng-container>
</div>
