<sg-modal
  title=""
  [shortHeader]="true"
  [showBorders]="false"
  [centerFooter]="true"
  primaryButtonText="Close"
  (clickedPrimary)="closeModal()"
  [hasSecondaryButton]="false">
  <div modalBodyContent>
    <sg-modal-confirmation-dialog
      infoType="success"
      headline="&ldquo;{{ scenarioName }}&rdquo; was successfully uploaded"
      message="You can now view and plan on your project areas.">
    </sg-modal-confirmation-dialog>
  </div>
</sg-modal>
