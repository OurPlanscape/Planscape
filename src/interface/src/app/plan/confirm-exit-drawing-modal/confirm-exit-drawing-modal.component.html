<sg-modal
  title="Leave Draw Planning Area Mode?"
  [shortHeader]="true"
  [showBorders]="false"
  [centerFooter]="true"
  primaryButtonText="Discard & Exit"
  (clickedClose)="closeModal()">
  <div modalBodyContent>You’ve drawn one or more planning areas on the map. If you exit now, your work will be lost. Are you sure you want to cancel and discard the drawn area(s)?</div>
</sg-modal>
