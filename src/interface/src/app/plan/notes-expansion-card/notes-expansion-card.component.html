<ng-container *ngIf="notes$ | async as notes">
  <h3 class="section-title">
    Notes<span *ngIf="notes.length > 0"> ({{ notes.length }})</span>
  </h3>
  <button
    sg-button
    variant="icon-only"
    icon="open_in_full"
    [outlined]="true"
    (click)="openNotesPanel()"></button>
</ng-container>
