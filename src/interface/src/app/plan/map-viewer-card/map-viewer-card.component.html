<mgl-map
  [id]="'map_viewer_card'"
  [fitBoundsOptions]="boundsOptions"
  [attributionControl]="false"
  [transformRequest]="transformRequest"
  [interactive]="false"
  [style]="(baseLayerUrl$ | async) || ''"
  (mapLoad)="onMapLoad($event)">
  <mgl-layer
    type="background"
    id="middle-layer"
    [layout]="{ visibility: 'none' }">
  </mgl-layer>
  <app-planning-area-layer before="middle-layer"></app-planning-area-layer>
</mgl-map>
<div *ngIf="currentPlan$ | async as plan" class="overlay-navigation">
  <a class="label" [routerLink]="['/explore', plan?.id]">Map Viewer</a>
  <a class="label" [routerLink]="['/explore', plan?.id]"><mat-icon>chevron_right</mat-icon></a>
</div>
