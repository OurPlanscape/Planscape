<div
  class="analytics-tools-container"
  [class.in-overview]="isPlanningOverviewEnabled"
  *ngIf="hasEnabledTools">
  <div class="header">
    <h3 class="section-title">Planning Area Analytics Tools</h3>
    <div class="details" *ngIf="isPlanningOverviewEnabled">
      Our planning area tools are available to provide detailed analyses
      tailored to your planning area.
    </div>
  </div>
  <div class="tools-grid">
    <ng-container *ngFor="let tool of analyticsTools">
      <sg-tile-button
        [backgroundImage]="tool.backgroundImage"
        [backgroundColor]="tool.backgroundColor ?? ''"
        [title]="tool.title"
        [ngClass]="tool.localClass || ''"
        size="lg"
        [subtitle]="tool.subtitle"
        [disabled]="!tool.enabled"
        (tileClick)="onToolClick(tool.id)">
      </sg-tile-button>
    </ng-container>
  </div>
</div>
