<button sg-button icon="share_outlined" (click)="shareReport()">Share</button>
<button
  sg-button
  icon="download"
  [matMenuTriggerFor]="menu"
  #trigger="matMenuTrigger"
  [disabled]="generatingPdf || buttonDisabled"
  [variant]="isFullView ? 'primary' : 'ghost'">
  {{
    generatingPdf
      ? 'Generating PDF…'
      : isFullView
        ? 'Download Options'
        : 'Download'
  }}
  <mat-icon
    class="material-symbols-outlined download-options-down"
    [ngClass]="{ full: isFullView }"
    >{{ trigger.menuOpen ? 'arrow_drop_up' : 'arrow_drop_down' }}
  </mat-icon>
</button>
<mat-menu #menu="matMenu">
  <button mat-menu-item (click)="downloadGeopackage()">Geopackage</button>
  <button mat-menu-item (click)="downloadPDF()">PDF</button>
</mat-menu>
<button
  sg-button
  *ngIf="footerType === 'preview'"
  icon="open_in_full"
  variant="primary"
  (click)="openFullView()">
  Open Full View
</button>
