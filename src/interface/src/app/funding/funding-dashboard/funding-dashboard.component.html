<sg-dashboard-layout
  layoutVariant="disable-right-scroll"
  class="project-area-dashboard-layout">
  <div header>
    <!-- NavBar -->
    <app-nav-bar area="SCENARIO"></app-nav-bar>
  </div>
  <div left-column class="left-column">
    <sg-tool-info-card
      theme="dark"
      cardTitle="Funding Opportunity Report"
      mainImagePath="assets/svg/funding-white.svg"
      creditImagePath="assets/svg/icons/planscape-color-logo-w-text.svg"
      creditImageAlt="Planscape"
      creditText="in partnership with:"
      [showTooltipButton]="false"
      description="The Funding Report module aims to help you communicate the funding
      opportunity of their scenarios by translating treatment outcomes into
      standardized metrics. Through this auto-generated report, you can present
      the carbon, biomass, wildfire risk, and water benefits of proposed
      treatments to conservation finance partners and funders, supporting
      project alignment, portfolio building, and investment decision-making."
      [partners]="partners"></sg-tool-info-card>
  </div>
  <div right-column class="right-column">
    <app-funding-empty-state
      *ngIf="(report$ | async) === null; else reportView"
      (generateReport)="generateReport()">
    </app-funding-empty-state>
    <ng-template #reportView>
      <div class="generating-report" *ngIf="isGenerating$ | async">
        <mat-spinner diameter="36"></mat-spinner>
        <section>
          <div class="generating-title">Funding Report is being generated</div>
          <div class="generating-text">
            You’ll be notified when it’s ready by email, the completed report
            can be viewed here.
          </div>
        </section>
      </div>
      <!-- TODO: other states, errors, etc.  -->
      <app-funding-report *ngIf="hasOutput$ | async"></app-funding-report>
    </ng-template>
  </div>
</sg-dashboard-layout>
