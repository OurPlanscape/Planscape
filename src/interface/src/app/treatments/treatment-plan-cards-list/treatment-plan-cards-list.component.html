  <sg-treatment-card  *ngFor="let tx of plans"
    [name]="tx.name"
    [status]="tx.status"
    [createdAt]="tx.created_at"
    [creator]="tx.creator_name"
    [userCanDelete]="userCanDelete()"
    [userCanDuplicate]="userCanDuplicate()"
    (view)="goToTreatment(tx)"
    (delete)="openDeleteDialog(tx)"
    (duplicate)="duplicateTreatment(tx)"
    ></sg-treatment-card>
