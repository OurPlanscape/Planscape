<mgl-map
  [id]="'map_' + mapNumber"
  [boxZoom]="false"
  [dragRotate]="false"
  [interactive]="true"
  [maxZoom]="maxZoom"
  [minZoom]="minZoom"
  [pitchWithRotate]="false"
  [fitBounds]="(bounds$ | async) || undefined"
  (mapLoad)="mapLoaded($event)"
  [style]="(baseLayerUrl$ | async) || ''"
  [attributionControl]="false"
  [transformRequest]="transformRequest"
  [ngClass]="{
    'highlighted-map': showMapNumber && (isSelected$ | async) === true,
  }">
  <app-map-base-layers
    *ngIf="mapLibreMap"
    [mapLibreMap]="mapLibreMap"></app-map-base-layers>

  <mgl-control position="bottom-left" *ngIf="showMapNumber">
    <div class="label" [class.selected-map]="(isSelected$ | async) === true">
      Map {{ mapNumber }}
    </div>
  </mgl-control>

  <mgl-control
    position="bottom-right"
    *ngIf="(drawingModeEnabled$ | async) === true">
    <div class="drawing-toolbox">
      <button (click)="handlePolygonButton()">
        <mat-icon class="material-symbols-outlined">polyline</mat-icon>
      </button>
      <button (click)="handleSelectButton()">
        <mat-icon class="material-symbols-outlined"
          >arrow_selector_tool</mat-icon
        >
      </button>
      <button (click)="handleTrashButton()">
        <mat-icon class="material-symbols-outlined">delete</mat-icon>
      </button>
    </div>
  </mgl-control>
</mgl-map>
