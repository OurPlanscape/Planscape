<div *ngFor="let layer of selectedLayers$ | async">
  <ng-container *ngIf="layer.map_service_type === 'ESRI_GEOJSON'">
    <app-map-arcgis-vector-layer
      *ngIf="mapLibreMap"
      [layer]="layer"
      [before]="layerInsertPosition"
      [mapLibreMap]="mapLibreMap"
      (updateTooltipData)="
        setTooltipData($event)
      "></app-map-arcgis-vector-layer>
  </ng-container>
  <ng-container *ngIf="layer.map_service_type === 'VECTORTILES'">
    <mgl-vector-source
      [id]="'source_' + layer.id"
      [tiles]="[layer.map_url]"
      [promoteId]="'id'"></mgl-vector-source>
    <mgl-layer
      [id]="'layer_fill_' + layer.id"
      [source]="'source_' + layer.id"
      [sourceLayer]="'dynamic_' + layer.id"
      (layerMouseMove)="hoverOnLayer($event, layer, 'layer_fill_')"
      (layerMouseOut)="hoverOutLayer()"
      type="fill"
      [paint]="fillLayerPaint(layer)"
      [before]="layerInsertPosition"></mgl-layer>
    <mgl-layer
      [id]="'layer_outline_' + layer.id"
      [source]="'source_' + layer.id"
      [sourceLayer]="'dynamic_' + layer.id"
      (layerMouseMove)="hoverOnLayer($event, layer, 'layer_outline_')"
      (layerMouseOut)="hoverOutLayer()"
      type="line"
      [paint]="lineLayerPaint(layer)"
      [before]="'layer_fill_' + layer.id"></mgl-layer>
  </ng-container>
  <!-- if we have "point" data... tbd how we detect it... -->
  <ng-container *ngIf="layer.map_service_type === 'VECTORTILES_POINTS'">
  <mgl-vector-source
    [id]="'source_' + layer.id"
    [tiles]="[layer.map_url]"
    [promoteId]="'id'">
  </mgl-vector-source>

  <mgl-layer
    [id]="'layer_points_' + layer.id"
    [source]="'source_' + layer.id"
    [sourceLayer]="'dynamic_' + layer.id"
    type="symbol"
    [layout]="getPointLayout(layer)"
    (layerClick)="handlePointClick($event)"
    (layerMouseEnter)="onMouseEnter()"
    (layerMouseLeave)="onMouseLeave()">
  </mgl-layer>

  <mgl-popup
    *ngIf="selectedFeature"
    [lngLat]="selectedFeature.geometry.coordinates"
    [closeButton]="false"
    [closeOnClick]="true">
    <div class="tooltip-content">
      <strong>{{ selectedFeature.properties.name }}</strong>
      <p>Status: {{ selectedFeature.properties.status }}</p>
    </div>
  </mgl-popup>
</ng-container>
</div>
<app-map-base-layer-tooltip
  *ngIf="enableBaseLayerHover$ && (currentTooltipInfo$ | async) as toolTipInfo"
  [content]="toolTipInfo?.content ?? null"
  [lngLat]="toolTipInfo?.longLat ?? null"></app-map-base-layer-tooltip>
