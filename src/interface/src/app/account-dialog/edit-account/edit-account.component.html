<div *ngIf="editingAccount">
  <form [formGroup]="editAccountForm" (ngSubmit)="saveEdits()">
    <mat-form-field>
      <mat-label>First name</mat-label>
      <input type="text" required formControlName="firstName" matInput />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Last name</mat-label>
      <input type="text" required formControlName="lastName" matInput />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Email</mat-label>
      <input
        type="text"
        disabled
        [value]="editAccountForm.get('email')?.value"
        matInput />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Current password</mat-label>
      <input
        type="password"
        required
        formControlName="currentPassword"
        matInput />
    </mat-form-field>

    <div class="button-row">
      <button
        mat-raised-button
        color="primary"
        [disabled]="editAccountForm.invalid || disableEditButton"
        (click)="saveEdits()">
        {{ disableEditButton ? 'SAVING...' : 'SAVE CHANGES' }}
      </button>

      <button mat-raised-button (click)="editingAccount = false">CANCEL</button>
    </div>
    <mat-error>
      <p *ngIf="error">{{ error?.message }}</p>
    </mat-error>
  </form>
</div>
